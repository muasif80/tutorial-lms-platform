# Tests run on in-memory H2 in PostgreSQL-compatibility mode. Hibernate creates
# the schema; Flyway (whose migration uses Postgres-only RLS) is disabled here.
spring.datasource.url=jdbc:h2:mem:scholr;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.flyway.enabled=false
# never seed the demo tenant during tests (each test builds its own fixtures)
scholr.seed=false
